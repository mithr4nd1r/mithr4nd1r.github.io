title: Osvaldo Tenorio
description: "Red Team Operator · Exploit Dev · Adversary Emulation — writeups, evasion, and research by Osvaldo Tenorio."
url: "https://mithr4nd1r.github.io"
baseurl: ""
lang: en
author: Osvaldo Tenorio

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

permalink: pretty

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - "*.sh"
  - "*.py"

defaults:
  - scope:
      path: ""
    values:
      layout: page

  - scope:
      path: "evasion"
      type: pages
    values:
      layout: cyber
      section: evasion
  - scope:
      path: "exploit-dev"
      type: pages
    values:
      layout: cyber
      section: exploit-dev
  - scope:
      path: "methodology"
      type: pages
    values:
      layout: cyber
      section: methodology
  - scope:
      path: "toolkit"
      type: pages
    values:
      layout: cyber
      section: toolkit
  - scope:
      path: "web"
      type: pages
    values:
      layout: cyber
      section: web
  - scope:
      path: "writeups"
      type: pages
    values:
      layout: writeup

  - scope:
      path: "evasion/index.md"
    values:
      layout: page
  - scope:
      path: "exploit-dev/index.md"
    values:
      layout: page
  - scope:
      path: "methodology/index.md"
    values:
      layout: page
  - scope:
      path: "toolkit/index.md"
    values:
      layout: page
  - scope:
      path: "web/index.md"
    values:
      layout: page
  - scope:
      path: "writeups/index.md"
    values:
      layout: page
